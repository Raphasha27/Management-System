name: CI

on:
  workflow_dispatch:

  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on:
  workflow_dispatch:
 ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version:
  workflow_dispatch:
 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run build
        env:
          DATABASE_URL: "file:./dev.db" # Local SQLite for build check
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"

